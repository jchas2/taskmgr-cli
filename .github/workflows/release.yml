name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get-version.outputs.version }}
          release_name: Release v${{ steps.get-version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Release v${{ steps.get-version.outputs.version }}

            ### Installation

            **macOS (Homebrew):**
            ```bash
            brew tap jchas2/taskmgr
            brew install taskmgr
            ```

            **Direct Download:**
            Download the appropriate binary for your platform below.

            ### Checksums
            SHA256 checksums are provided for each artifact.

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
            runtime: osx-arm64
          - arch: x64
            runner: macos-13
            runtime: osx-x64
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and Publish
        run: |
          chmod +x ./eng/build.sh
          ./eng/build.sh --restore --publish --config Release --runtime ${{ matrix.runtime }}

      - name: Create archive
        run: |
          cd src/taskmgr/bin/Release/net10.0/${{ matrix.runtime }}/publish
          tar -czf taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz taskmgr
          shasum -a 256 taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz > taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src/taskmgr/bin/Release/net10.0/${{ matrix.runtime }}/publish/taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz
          asset_name: taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src/taskmgr/bin/Release/net10.0/${{ matrix.runtime }}/publish/taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256
          asset_name: taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz.sha256
          asset_content_type: text/plain

      - name: Save artifact for Homebrew
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-binary
          path: src/taskmgr/bin/Release/net10.0/${{ matrix.runtime }}/publish/taskmgr-${{ needs.create-release.outputs.version }}-macos-${{ matrix.arch }}.tar.gz

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and Publish
        run: |
          ./eng/build.ps1 -restore -publish -config Release -runtime win-x64

      - name: Create archive
        shell: pwsh
        run: |
          cd src/taskmgr/bin/Release/net10.0/win-x64/publish
          Compress-Archive -Path taskmgr.exe -DestinationPath taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip
          $hash = (Get-FileHash -Algorithm SHA256 taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip).Hash
          "$hash  taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip" | Out-File -FilePath taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip.sha256 -Encoding ASCII

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src/taskmgr/bin/Release/net10.0/win-x64/publish/taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip
          asset_name: taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip
          asset_content_type: application/zip

      - name: Upload Checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: src/taskmgr/bin/Release/net10.0/win-x64/publish/taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip.sha256
          asset_name: taskmgr-${{ needs.create-release.outputs.version }}-windows-x64.zip.sha256
          asset_content_type: text/plain

  update-homebrew:
    name: Update Homebrew Formula
    needs: [create-release, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-binary

      - name: Calculate SHA256
        id: sha
        run: |
          SHA256=$(shasum -a 256 taskmgr-${{ needs.create-release.outputs.version }}-macos-arm64.tar.gz | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: jchas2/homebrew-taskmgr
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        run: |
          cd homebrew-tap
          cat > Formula/taskmgr.rb << 'EOF'
          class Taskmgr < Formula
            desc "Task Manager for the command line"
            homepage "https://github.com/jchas2/taskmgr-cli"
            version "${{ needs.create-release.outputs.version }}"

            if Hardware::CPU.arm?
              url "https://github.com/jchas2/taskmgr-cli/releases/download/v#{version}/taskmgr-#{version}-macos-arm64.tar.gz"
              sha256 "${{ steps.sha.outputs.sha256 }}"
            else
              url "https://github.com/jchas2/taskmgr-cli/releases/download/v#{version}/taskmgr-#{version}-macos-x64.tar.gz"
              sha256 "PLACEHOLDER_X64_SHA"
            end

            def install
              bin.install "taskmgr"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/taskmgr --version")
            end
          end
          EOF

      - name: Get x64 SHA256
        id: sha-x64
        run: |
          curl -sL "https://github.com/jchas2/taskmgr-cli/releases/download/v${{ needs.create-release.outputs.version }}/taskmgr-${{ needs.create-release.outputs.version }}-macos-x64.tar.gz" -o taskmgr-x64.tar.gz
          SHA256_X64=$(shasum -a 256 taskmgr-x64.tar.gz | cut -d ' ' -f 1)
          echo "sha256_x64=$SHA256_X64" >> $GITHUB_OUTPUT
          echo "x64 SHA256: $SHA256_X64"

      - name: Update x64 SHA256 in Formula
        run: |
          cd homebrew-tap
          sed -i "s/PLACEHOLDER_X64_SHA/${{ steps.sha-x64.outputs.sha256_x64 }}/g" Formula/taskmgr.rb

      - name: Commit and Push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/taskmgr.rb
          git commit -m "Update taskmgr to ${{ needs.create-release.outputs.version }}"
          git push
